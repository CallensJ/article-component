
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="stylesheet" href="./sass/styles.css" />
            <title>Article component</title>
          </head>
          <body>
           
            <section>
              <div class="container">
                <div class="image__container">
                  <img src="./images/drawers.jpg" alt="image drawer" class="image" />
                </div>
                <div class="text__container">
                  <p class="heading"> Shift the overall look and feel by adding these wonderful touches to
                    furniture in your home</p>
                  <p class="text"> Ever been in a room and felt like something was missing? Perhaps it
                    felt slightly bare and uninviting. I've got some simple tips to help
                    you make any room feel complete.</p>
                    <div class="footer__container">
                      <div class="profil__container">
                        <img src="./images/avatar-michelle.jpg" alt="image avatar" class="profil__image" />
                        <div class="profil__content">
                          <h1>Michelle Appleton</h1>
                          <span>28 jun 2020</span>
    
                        </div>
                      </div>
                      <button class="btn"><img src="./images/icon-share.svg" alt="button"/></button>
                    </div>
                </div>
              </div>
            </section>
          <script src="index.js"></script>
          </body>
          </html>
